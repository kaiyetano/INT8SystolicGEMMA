<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">

<style>
  svg { font-family: Segoe UI, Arial, sans-serif; background: #fbfcfe; }
  .title { font-size: 24px; font-weight: 700; fill: #172033; }
  .subtitle { font-size: 13px; fill: #506070; }
  .box { fill: #ffffff; stroke: #21314d; stroke-width: 1.6; rx: 8; }
  .accent { fill: #eaf2ff; stroke: #235a9f; }
  .mem { fill: #fff7e6; stroke: #9a6a11; }
  .ctrl { fill: #edf8f1; stroke: #23733d; }
  .pipe { fill: #f7eefc; stroke: #71419a; }
  .small { font-size: 12px; fill: #243044; }
  .label { font-size: 14px; font-weight: 650; fill: #111827; }
  .note { font-size: 11px; fill: #5f6b7a; }
  .arrow { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  .dash { stroke-dasharray: 5 4; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151" />
  </marker>
</defs>

<text x="32" y="38" class="title">systolic_array RTL view</text>
<text x="32" y="60" class="subtitle">Parameterized N x N output-stationary PE mesh used by the accelerator core.</text>
<rect x="300" y="120" width="110" height="60" class="box accent"/>
<text x="314" y="144" class="label">PE[0][0]</text>
<text x="314" y="166" class="small">C00 accum</text>
<rect x="450" y="120" width="110" height="60" class="box accent"/>
<text x="464" y="144" class="label">PE[0][1]</text>
<text x="464" y="166" class="small">C01 accum</text>
<rect x="600" y="120" width="110" height="60" class="box accent"/>
<text x="614" y="144" class="label">PE[0][2]</text>
<text x="614" y="166" class="small">C02 accum</text>
<rect x="300" y="215" width="110" height="60" class="box accent"/>
<text x="314" y="239" class="label">PE[1][0]</text>
<text x="314" y="261" class="small">C10 accum</text>
<rect x="450" y="215" width="110" height="60" class="box accent"/>
<text x="464" y="239" class="label">PE[1][1]</text>
<text x="464" y="261" class="small">C11 accum</text>
<rect x="600" y="215" width="110" height="60" class="box accent"/>
<text x="614" y="239" class="label">PE[1][2]</text>
<text x="614" y="261" class="small">C12 accum</text>
<rect x="300" y="310" width="110" height="60" class="box accent"/>
<text x="314" y="334" class="label">PE[2][0]</text>
<text x="314" y="356" class="small">C20 accum</text>
<rect x="450" y="310" width="110" height="60" class="box accent"/>
<text x="464" y="334" class="label">PE[2][1]</text>
<text x="464" y="356" class="small">C21 accum</text>
<rect x="600" y="310" width="110" height="60" class="box accent"/>
<text x="614" y="334" class="label">PE[2][2]</text>
<text x="614" y="356" class="small">C22 accum</text>
<path d="M 90 150 L 300 150" class="arrow"/>
<text x="195.0" y="144.0" text-anchor="middle" class="note">A row 0</text>
<path d="M 410 150 L 450 150" class="arrow"/>

<path d="M 560 150 L 600 150" class="arrow"/>

<path d="M 90 245 L 300 245" class="arrow"/>
<text x="195.0" y="239.0" text-anchor="middle" class="note">A row 1</text>
<path d="M 410 245 L 450 245" class="arrow"/>

<path d="M 560 245 L 600 245" class="arrow"/>

<path d="M 90 340 L 300 340" class="arrow"/>
<text x="195.0" y="334.0" text-anchor="middle" class="note">A row 2</text>
<path d="M 410 340 L 450 340" class="arrow"/>

<path d="M 560 340 L 600 340" class="arrow"/>

<path d="M 355 80 L 355 120" class="arrow"/>
<text x="355.0" y="94.0" text-anchor="middle" class="note">B col 0</text>
<path d="M 355 180 L 355 215" class="arrow"/>

<path d="M 355 275 L 355 310" class="arrow"/>

<path d="M 505 80 L 505 120" class="arrow"/>
<text x="505.0" y="94.0" text-anchor="middle" class="note">B col 1</text>
<path d="M 505 180 L 505 215" class="arrow"/>

<path d="M 505 275 L 505 310" class="arrow"/>

<path d="M 655 80 L 655 120" class="arrow"/>
<text x="655.0" y="94.0" text-anchor="middle" class="note">B col 2</text>
<path d="M 655 180 L 655 215" class="arrow"/>

<path d="M 655 275 L 655 310" class="arrow"/>

<rect x="80" y="330" width="710" height="70" class="box ctrl"/>
<text x="94" y="354" class="label">Dataflow</text>
<text x="94" y="376" class="small">A operands move left-to-right, B operands move top-to-bottom, and each PE keeps its own output accumulator.</text>
</svg>
