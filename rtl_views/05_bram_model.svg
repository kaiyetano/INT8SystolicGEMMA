<svg xmlns="http://www.w3.org/2000/svg" width="960" height="410" viewBox="0 0 960 410">

<style>
  svg { font-family: Segoe UI, Arial, sans-serif; background: #fbfcfe; }
  .title { font-size: 24px; font-weight: 700; fill: #172033; }
  .subtitle { font-size: 13px; fill: #506070; }
  .box { fill: #ffffff; stroke: #21314d; stroke-width: 1.6; rx: 8; }
  .accent { fill: #eaf2ff; stroke: #235a9f; }
  .mem { fill: #fff7e6; stroke: #9a6a11; }
  .ctrl { fill: #edf8f1; stroke: #23733d; }
  .pipe { fill: #f7eefc; stroke: #71419a; }
  .small { font-size: 12px; fill: #243044; }
  .label { font-size: 14px; font-weight: 650; fill: #111827; }
  .note { font-size: 11px; fill: #5f6b7a; }
  .arrow { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  .dash { stroke-dasharray: 5 4; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151" />
  </marker>
</defs>

<text x="32" y="38" class="title">bram_model RTL view</text>
<text x="32" y="60" class="subtitle">Dual-port BRAM abstraction used for A banks, B banks, and the row-major output C memory.</text>
<rect x="80" y="130" width="190" height="100" class="box accent"/>
<text x="94" y="154" class="label">Write port A</text>
<text x="94" y="176" class="small">write_en</text>
<text x="94" y="192" class="small">write_addr</text>
<text x="94" y="208" class="small">write_data</text>
<rect x="360" y="110" width="220" height="140" class="box mem"/>
<text x="374" y="134" class="label">M10K / sim memory</text>
<text x="374" y="156" class="small">DEPTH words</text>
<text x="374" y="172" class="small">DATA_WIDTH bits</text>
<text x="374" y="188" class="small">dual-port behavior</text>
<rect x="690" y="130" width="190" height="100" class="box accent"/>
<text x="704" y="154" class="label">Read port B</text>
<text x="704" y="176" class="small">read_en</text>
<text x="704" y="192" class="small">read_addr</text>
<text x="704" y="208" class="small">read_data + valid</text>
<path d="M 270 180 L 360 180" class="arrow"/>
<text x="315.0" y="174.0" text-anchor="middle" class="note">synchronous write</text>
<path d="M 580 180 L 690 180" class="arrow"/>
<text x="635.0" y="174.0" text-anchor="middle" class="note">registered read valid</text>
<rect x="210" y="290" width="540" height="62" class="box pipe"/>
<text x="224" y="314" class="label">Implementation split</text>
<text x="224" y="336" class="small">SIMULATION uses behavioral array; synthesis uses Intel altsyncram configured for Cyclone V M10K.</text>
</svg>
