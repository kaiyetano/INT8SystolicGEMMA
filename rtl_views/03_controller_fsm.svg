<svg xmlns="http://www.w3.org/2000/svg" width="820" height="450" viewBox="0 0 820 450">

<style>
  svg { font-family: Segoe UI, Arial, sans-serif; background: #fbfcfe; }
  .title { font-size: 24px; font-weight: 700; fill: #172033; }
  .subtitle { font-size: 13px; fill: #506070; }
  .box { fill: #ffffff; stroke: #21314d; stroke-width: 1.6; rx: 8; }
  .accent { fill: #eaf2ff; stroke: #235a9f; }
  .mem { fill: #fff7e6; stroke: #9a6a11; }
  .ctrl { fill: #edf8f1; stroke: #23733d; }
  .pipe { fill: #f7eefc; stroke: #71419a; }
  .small { font-size: 12px; fill: #243044; }
  .label { font-size: 14px; font-weight: 650; fill: #111827; }
  .note { font-size: 11px; fill: #5f6b7a; }
  .arrow { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  .dash { stroke-dasharray: 5 4; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151" />
  </marker>
</defs>

<text x="32" y="38" class="title">controller_fsm RTL state machine</text>
<text x="32" y="60" class="subtitle">Seven-state controller for clearing, skewed operand issue, output writeback, and completion.</text>
<rect x="80" y="120" width="125" height="58" class="box ctrl"/>
<text x="94" y="144" class="label">IDLE</text>

<rect x="250" y="120" width="125" height="58" class="box accent"/>
<text x="264" y="144" class="label">CLEAR</text>

<rect x="420" y="120" width="125" height="58" class="box accent"/>
<text x="434" y="144" class="label">RUN</text>

<rect x="590" y="120" width="125" height="58" class="box accent"/>
<text x="604" y="144" class="label">WRITE_OUTPUT</text>

<rect x="590" y="250" width="125" height="58" class="box accent"/>
<text x="604" y="274" class="label">WRITE_FLUSH1</text>

<rect x="420" y="250" width="125" height="58" class="box accent"/>
<text x="434" y="274" class="label">WRITE_FLUSH2</text>

<rect x="250" y="250" width="125" height="58" class="box ctrl"/>
<text x="264" y="274" class="label">DONE</text>

<path d="M 205 149 L 375 149" class="arrow"/>

<path d="M 375 149 L 545 149" class="arrow"/>

<path d="M 545 149 L 715 149" class="arrow"/>

<path d="M 715 149 L 715 279" class="arrow"/>

<path d="M 715 279 L 545 279" class="arrow"/>

<path d="M 545 279 L 375 279" class="arrow"/>

<path d="M 375 279 L 205 149" class="arrow"/>

<rect x="80" y="340" width="660" height="72" class="box pipe"/>
<text x="94" y="364" class="label">Outputs by state</text>
<text x="94" y="386" class="small">RUN emits skewed A/B addresses, WRITE_OUTPUT walks row-major C addresses, DONE pulses completion for one cycle.</text>
</svg>
