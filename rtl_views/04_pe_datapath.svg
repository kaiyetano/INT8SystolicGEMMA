<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360">

<style>
  svg { font-family: Segoe UI, Arial, sans-serif; background: #fbfcfe; }
  .title { font-size: 24px; font-weight: 700; fill: #172033; }
  .subtitle { font-size: 13px; fill: #506070; }
  .box { fill: #ffffff; stroke: #21314d; stroke-width: 1.6; rx: 8; }
  .accent { fill: #eaf2ff; stroke: #235a9f; }
  .mem { fill: #fff7e6; stroke: #9a6a11; }
  .ctrl { fill: #edf8f1; stroke: #23733d; }
  .pipe { fill: #f7eefc; stroke: #71419a; }
  .small { font-size: 12px; fill: #243044; }
  .label { font-size: 14px; font-weight: 650; fill: #111827; }
  .note { font-size: 11px; fill: #5f6b7a; }
  .arrow { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  .dash { stroke-dasharray: 5 4; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151" />
  </marker>
</defs>

<text x="32" y="38" class="title">pe RTL datapath</text>
<text x="32" y="60" class="subtitle">Processing element datapath for signed multiply-accumulate with optional product/DSP pipelining.</text>
<rect x="60" y="130" width="150" height="86" class="box accent"/>
<text x="74" y="154" class="label">Input registers</text>
<text x="74" y="176" class="small">A/B operands</text>
<text x="74" y="192" class="small">valid bits</text>
<rect x="270" y="105" width="180" height="90" class="box pipe"/>
<text x="284" y="129" class="label">Multiplier</text>
<text x="284" y="151" class="small">INT8 x INT8</text>
<text x="284" y="167" class="small">product width = 16</text>
<rect x="270" y="235" width="180" height="92" class="box pipe"/>
<text x="284" y="259" class="label">Pipeline option</text>
<text x="284" y="281" class="small">none, product reg,</text>
<text x="284" y="297" class="small">or 2-stage DSP</text>
<rect x="520" y="150" width="180" height="95" class="box ctrl"/>
<text x="534" y="174" class="label">Accumulator</text>
<text x="534" y="196" class="small">sign-extend product</text>
<text x="534" y="212" class="small">ACC_WIDTH sum</text>
<rect x="760" y="125" width="160" height="112" class="box accent"/>
<text x="774" y="149" class="label">Forward outputs</text>
<text x="774" y="171" class="small">A/B ripple onward</text>
<text x="774" y="187" class="small">valid ripple onward</text>
<text x="774" y="203" class="small">acc_out held local</text>
<path d="M 210 160 L 270 150" class="arrow"/>
<text x="240.0" y="149.0" text-anchor="middle" class="note">A/B</text>
<path d="M 450 150 L 520 174" class="arrow"/>
<text x="485.0" y="156.0" text-anchor="middle" class="note">product</text>
<path d="M 450 280 L 520 210" class="arrow"/>
<text x="485.0" y="239.0" text-anchor="middle" class="note">registered product</text>
<path d="M 700 188 L 760 180" class="arrow"/>
<text x="730.0" y="178.0" text-anchor="middle" class="note">local Cij</text>
<path d="M 210 185 L 760 210" class="arrow dash"/>
<text x="485.0" y="191.5" text-anchor="middle" class="note">A/B + valid pass-through</text>
</svg>
