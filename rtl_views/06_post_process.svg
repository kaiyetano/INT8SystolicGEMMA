<svg xmlns="http://www.w3.org/2000/svg" width="1070" height="390" viewBox="0 0 1070 390">

<style>
  svg { font-family: Segoe UI, Arial, sans-serif; background: #fbfcfe; }
  .title { font-size: 24px; font-weight: 700; fill: #172033; }
  .subtitle { font-size: 13px; fill: #506070; }
  .box { fill: #ffffff; stroke: #21314d; stroke-width: 1.6; rx: 8; }
  .accent { fill: #eaf2ff; stroke: #235a9f; }
  .mem { fill: #fff7e6; stroke: #9a6a11; }
  .ctrl { fill: #edf8f1; stroke: #23733d; }
  .pipe { fill: #f7eefc; stroke: #71419a; }
  .small { font-size: 12px; fill: #243044; }
  .label { font-size: 14px; font-weight: 650; fill: #111827; }
  .note { font-size: 11px; fill: #5f6b7a; }
  .arrow { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  .dash { stroke-dasharray: 5 4; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151" />
  </marker>
</defs>

<text x="32" y="38" class="title">post_process RTL view</text>
<text x="32" y="60" class="subtitle">Output post-processing block that adds optional bias and applies optional ReLU before C-memory writeback.</text>
<rect x="90" y="120" width="170" height="86" class="box accent"/>
<text x="104" y="144" class="label">acc_in</text>
<text x="104" y="166" class="small">signed INT32</text>
<text x="104" y="182" class="small">raw GEMM result</text>
<rect x="90" y="245" width="170" height="86" class="box accent"/>
<text x="104" y="269" class="label">bias_in</text>
<text x="104" y="291" class="small">signed INT32</text>
<text x="104" y="307" class="small">per output column</text>
<rect x="340" y="155" width="180" height="94" class="box pipe"/>
<text x="354" y="179" class="label">Bias adder</text>
<text x="354" y="201" class="small">biased = acc + bias</text>
<rect x="610" y="155" width="190" height="94" class="box ctrl"/>
<text x="624" y="179" class="label">ReLU mux</text>
<text x="624" y="201" class="small">if enabled and &lt; 0</text>
<text x="624" y="217" class="small">then clamp to zero</text>
<rect x="870" y="165" width="140" height="72" class="box accent"/>
<text x="884" y="189" class="label">y_out</text>
<text x="884" y="211" class="small">stored in BRAM_C</text>
<path d="M 260 163 L 340 185" class="arrow"/>
<text x="300.0" y="168.0" text-anchor="middle" class="note">acc</text>
<path d="M 260 288 L 340 220" class="arrow"/>
<text x="300.0" y="248.0" text-anchor="middle" class="note">bias</text>
<path d="M 520 202 L 610 202" class="arrow"/>
<text x="565.0" y="196.0" text-anchor="middle" class="note">biased</text>
<path d="M 800 202 L 870 202" class="arrow"/>
<text x="835.0" y="196.0" text-anchor="middle" class="note">Y</text>
</svg>
